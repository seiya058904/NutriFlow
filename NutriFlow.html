    let petSpeechTimer = null;
    let dailyTargets = { intake: "", protein: "", height: "", water: "" };
    let chartRange = 30;
    let chartView = "line";

    function toDateString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatDateText(dateString) {
      const [year, month, day] = dateString.split("-");
      return `${year}年${Number(month)}月${Number(day)}日`;
    }

    function readNumber(value, required) {
      const trimmed = String(value ?? "").trim();
      if (!trimmed) return required ? null : "";
      const number = Number(trimmed);
      if (!Number.isFinite(number) || number < 0) return null;
      return number;
    }

    function setMessage(element, text, type) {
      element.textContent = text;
      element.className = `message ${type || ""}`;
      if (text && type) showToast(text, type);
    }

    function showToast(text, type) {
      const container = document.querySelector("#toastContainer");
      const toast = document.createElement("div");
      toast.className = `toast ${type || ""}`;
      toast.textContent = text;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add("toast-out");
        toast.addEventListener("animationend", () => toast.remove());
      }, 3000);
    }

    function clearImportPreview() {
      pendingImportRecords = [];
      importPreview.classList.remove("show");
      importPreview.innerHTML = "";
    }

    function loadRecords() {
      recordsByDate.clear();
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;

      try {
        const records = JSON.parse(saved);
        if (!Array.isArray(records)) return;
        records.forEach((record) => {
          if (record && isValidDate(record.date) && Number.isFinite(Number(record.intake))) {
            recordsByDate.set(record.date, {
              date: record.date,
              intake: Number(record.intake),
              weight: record.weight === "" || record.weight === null ? "" : Number(record.weight),
              protein: record.protein === "" || record.protein === null ? "" : Number(record.protein),
              water: record.water === "" || record.water === null || record.water === undefined ? "" : Number(record.water)
            });
          }
        });
      } catch (error) {
        recordsByDate.clear();
      }
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(getSortedRecords()));
    }

    function loadTargets() {
      try {
        const saved = JSON.parse(localStorage.getItem(TARGET_STORAGE_KEY) || "{}");
        dailyTargets = {
          intake: Number.isFinite(Number(saved.intake)) && Number(saved.intake) > 0 ? Number(saved.intake) : "",
          protein: Number.isFinite(Number(saved.protein)) && Number(saved.protein) > 0 ? Number(saved.protein) : "",
          height: Number.isFinite(Number(saved.height)) && Number(saved.height) > 0 ? Number(saved.height) : "",
          water: Number.isFinite(Number(saved.water)) && Number(saved.water) > 0 ? Number(saved.water) : ""
        };
      } catch (error) {
        dailyTargets = { intake: "", protein: "", height: "", water: "" };
      }

      targetIntakeInput.value = dailyTargets.intake === "" ? "" : dailyTargets.intake;
      targetProteinInput.value = dailyTargets.protein === "" ? "" : dailyTargets.protein;
      heightInput.value = dailyTargets.height === "" ? "" : dailyTargets.height;
      targetWaterInput.value = dailyTargets.water === "" ? "" : dailyTargets.water;
    }

    function saveTargets() {
      const intake = readNumber(targetIntakeInput.value, false);
      const protein = readNumber(targetProteinInput.value, false);
      const height = readNumber(heightInput.value, false);
      const water = readNumber(targetWaterInput.value, false);

      if (intake === null || protein === null || height === null || water === null) {
        setMessage(targetMessage, "目标需要填写大于或等于 0 的数字，也可以留空。", "error");
        return;
      }

      dailyTargets = {
        intake: intake === 0 ? "" : intake,
        protein: protein === 0 ? "" : protein,
        height: height === 0 ? "" : height,
        water: water === 0 ? "" : water
      };
      localStorage.setItem(TARGET_STORAGE_KEY, JSON.stringify(dailyTargets));
      targetIntakeInput.value = dailyTargets.intake === "" ? "" : dailyTargets.intake;
      targetProteinInput.value = dailyTargets.protein === "" ? "" : dailyTargets.protein;
      heightInput.value = dailyTargets.height === "" ? "" : dailyTargets.height;
      targetWaterInput.value = dailyTargets.water === "" ? "" : dailyTargets.water;
      setMessage(targetMessage, "目标已保存，日历颜色已更新。", "success");
      render();
    }

    function getSortedRecords() {
      return Array.from(recordsByDate.values()).sort((a, b) => a.date.localeCompare(b.date));
    }

    function isValidDate(value) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) return false;
      const date = new Date(`${value}T00:00:00`);
      return !Number.isNaN(date.getTime()) && toDateString(date) === value;
    }

    function normalizeDate(value) {
      const clean = String(value ?? "")
        .trim()
        .replace(/年|[./、]/g, "-")
        .replace(/月/g, "-")
        .replace(/日/g, "")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");
      const fullDate = clean.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
      const shortDate = clean.match(/^(\d{1,2})-(\d{1,2})$/);
      let date = "";

      if (fullDate) {
        date = `${fullDate[1]}-${fullDate[2].padStart(2, "0")}-${fullDate[3].padStart(2, "0")}`;
      } else if (shortDate) {
        date = `${today.slice(0, 4)}-${shortDate[1].padStart(2, "0")}-${shortDate[2].padStart(2, "0")}`;
      }

      return isValidDate(date) ? date : "";
    }

    function recordFromInputs() {
      const date = dateInput.value;
      const intake = readNumber(intakeInput.value, true);
      const weight = readNumber(weightInput.value, false);
      const protein = readNumber(proteinInput.value, false);
      const water = readNumber(waterInput.value, false);

      if (!isValidDate(date)) return { error: "请选择正确的日期。" };
      if (intake === null) return { error: "摄入是必填项，请填写一个大于或等于 0 的数字。" };
      if (weight === null) return { error: "体重如果填写，需要是大于或等于 0 的数字。" };
      if (protein === null) return { error: "蛋白质如果填写，需要是大于或等于 0 的数字。" };
      if (water === null) return { error: "饮水如果填写，需要是大于或等于 0 的数字。" };

      return { date, intake, weight, protein, water };
    }

    function fillForm(record) {
      dateInput.value = record.date;
      intakeInput.value = record.intake;
      weightInput.value = record.weight === "" ? "" : record.weight;
      proteinInput.value = record.protein === "" ? "" : record.protein;
      waterInput.value = record.water === "" || record.water === undefined ? "" : record.water;
    }

    function clearFormForDate(date) {
      dateInput.value = date;
      intakeInput.value = "";
      weightInput.value = "";
      proteinInput.value = "";
      waterInput.value = "";
    }

    function render() {
      const sorted = getSortedRecords();
      renderTodaySummary(sorted);
      renderStats(sorted);
      renderCharts(sorted);
      renderCalendar();
      renderReview();
      renderTargetProgress();
      renderRecords(sorted);
    }

    function valueOrEmpty(value, unit) {
      return value === "" || !Number.isFinite(Number(value)) ? "未填写" : `${roundValue(Number(value))} ${unit}`;
    }

    function targetNoteForToday(record, key, label) {
      if (!record) return "保存后这里会更新";
      let target, unit;
      if (key === "intake") { target = dailyTargets.intake; unit = "kcal"; }
      else if (key === "protein") { target = dailyTargets.protein; unit = "g"; }
      else if (key === "water") { target = dailyTargets.water; unit = "ml"; }
      else return "目标还没有设置";
      if (target === "" || !Number.isFinite(Number(target)) || Number(target) <= 0) return "还没有设置目标";
      const value = record[key] === undefined ? "" : record[key];
      const check = metricTargetStatus(label, value, target, unit);
      return check ? check.text : "目标还没有设置";
    }

    function calculateBMI(weight, height) {
      if (!weight || !height || weight === "" || height === "") return null;
      const w = Number(weight);
      const h = Number(height) / 100;
      if (w <= 0 || h <= 0) return null;
      return w / (h * h);
    }

    function bmiCategory(bmi) {
      if (bmi === null) return "";
      if (bmi < 18.5) return "偏瘦";
      if (bmi < 24) return "正常";
      if (bmi < 28) return "偏胖";
      return "肥胖";
    }

    function renderTodaySummary(sorted) {
      const todayRecord = recordsByDate.get(today);
      const latest = sorted[sorted.length - 1];
      const latestText = latest ? `${latest.date} · ${roundValue(Number(latest.intake))} kcal` : "还没有记录";
      const latestNote = latest
        ? `共 ${sorted.length} 天，最近一次数据已保存`
        : "先填今天，趋势会自动出现";

      todaySummary.innerHTML = `
        <div class="summary-card">
          <span class="summary-label">今天摄入</span>
          <strong class="summary-value">${todayRecord ? valueOrEmpty(todayRecord.intake, "kcal") : "未填写"}</strong>
          <span class="summary-note">${targetNoteForToday(todayRecord, "intake", "热量")}</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">今天饮水</span>
          <strong class="summary-value">${todayRecord ? valueOrEmpty(todayRecord.water || "", "ml") : "未填写"}</strong>
          <span class="summary-note">${targetNoteForToday(todayRecord, "water", "饮水")}</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">连续记录</span>
          <strong class="summary-value">${sorted.length ? consecutiveRecordDays(sorted) + "天" : "--"}</strong>
          <span class="summary-note">${sorted.length ? recordHabitReview(sorted) : "开始记录吧"}</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">今天蛋白</span>
          <strong class="summary-value">${todayRecord ? valueOrEmpty(todayRecord.protein, "g") : "未填写"}</strong>
          <span class="summary-note">${targetNoteForToday(todayRecord, "protein", "蛋白")}</span>
        </div>
        <div class="summary-card wide">
          <span class="summary-label">最近记录</span>
          <strong class="summary-value">${latestText}</strong>
          <span class="summary-note">${latestNote}</span>
        </div>
      `;
    }

    function renderStats(sorted) {
      if (!sorted.length) {
        stats.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">还没有记录。先保存今天的摄入，趋势会立刻出现。</div>
        `;
        return;
      }

      const latest = sorted[sorted.length - 1];
      const averageProtein = averageFilledValue(sorted, "protein");
      const averageWater = averageFilledValue(sorted, "water");
      const weeklyWeightChange = averageWeeklyWeightChange(sorted);
      const weeklyWeightReview = weightTrendReview(sorted, weeklyWeightChange);
      const recordReview = recordHabitReview(sorted);
      const bmi = calculateBMI(latest.weight, dailyTargets.height);
      const bmiText = bmi === null ? "未填" : roundValue(bmi);
      const bmiNote = bmi === null ? "设置身高后显示" : bmiCategory(bmi);

      const cards = [
        statCard("已记录", sorted.length, "天", recordReview),
        statCard("最近摄入", latest.intake, "kcal"),
        statCard("最近体重", latest.weight === "" ? "未填" : latest.weight, latest.weight === "" ? "" : "kg"),
        statCard("最近饮水", (latest.water === "" || latest.water === undefined) ? "未填" : latest.water, (latest.water === "" || latest.water === undefined) ? "" : "ml"),
        statCard("最近蛋白质", latest.protein === "" ? "未填" : latest.protein, latest.protein === "" ? "" : "g"),
        statCard("平均蛋白", averageProtein === null ? "未填" : roundValue(averageProtein), averageProtein === null ? "" : "g/天"),
      ];

      if (dailyTargets.height) {
        cards.push(statCard("BMI", bmiText, "", bmiNote));
      }

      cards.push(statCard("平均饮水", averageWater === null ? "未填" : roundValue(averageWater), averageWater === null ? "" : "ml/天"));
      cards.push(statCard("平均周体重变化", weeklyWeightChange === null ? "未填" : formatSignedValue(weeklyWeightChange), weeklyWeightChange === null ? "" : "kg/周", weeklyWeightReview));

      const last7 = sorted.slice(-7);
      const avgIntake7 = averageFilledValue(last7, "intake");
      const rate = weeklyTargetRate(sorted, dailyTargets.intake);
      cards.push(statCard("本周达标", rate.text, "", rate.note));
      cards.push(statCard("平均摄入", avgIntake7 === null ? "--" : roundValue(avgIntake7), avgIntake7 === null ? "" : "kcal/天", "近 7 天"));
      cards.push(statCard("目标热量", dailyTargets.intake || "--", dailyTargets.intake ? "kcal" : "", "每日目标"));

      stats.innerHTML = cards.join("");
    }

    function averageFilledValue(records, key) {
      const values = records
        .map((record) => record[key])
        .filter((value) => value !== "" && Number.isFinite(Number(value)))
        .map(Number);

      if (!values.length) return null;
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function weeklyTargetRate(records, target) {
      if (!target || !Number(target)) return { text: "--", note: "未设目标" };
      const last7 = records.slice(-7);
      const withData = last7.filter(r => r.intake !== "");
      if (!withData.length) return { text: "--", note: "暂无数据" };
      const hit = withData.filter(r => {
        const s = metricTargetStatus("热量", r.intake, target, "kcal");
        return s && s.level === "good";
      }).length;
      return { text: `${hit}/${withData.length}`, note: "本周达标" };
    }

    function averageWeeklyWeightChange(records) {
      const weightPoints = records
        .filter((record) => record.weight !== "" && Number.isFinite(Number(record.weight)))
        .map((record) => ({ date: record.date, value: Number(record.weight) }));

      if (weightPoints.length < 2) return null;

      const first = weightPoints[0];
      const last = weightPoints[weightPoints.length - 1];
      const days = daysBetween(first.date, last.date);
      if (days <= 0) return null;

      return ((last.value - first.value) / days) * 7;
    }

    function consecutiveRecordDays(records) {
      if (!records.length) return 0;

      let streak = 1;
      for (let index = records.length - 1; index > 0; index -= 1) {
        if (daysBetween(records[index - 1].date, records[index].date) !== 1) break;
        streak += 1;
      }
      return streak;
    }

    function recordHabitReview(records) {
      const streak = consecutiveRecordDays(records);
      if (streak >= 30) return `优秀连续 · ${streak} 天`;
      if (streak >= 14) return `很稳 · 连续 ${streak} 天`;
      if (streak >= 7) return `良好 · 连续 ${streak} 天`;
      if (streak >= 3) return `保持中 · 连续 ${streak} 天`;
      if (records.length >= 14) return "有积累 · 继续连起来";
      return "刚起步 · 先记满 3 天";
    }

    function latestWeightValue(records) {
      const point = records
        .slice()
        .reverse()
        .find((record) => record.weight !== "" && Number.isFinite(Number(record.weight)));

      return point ? Number(point.weight) : null;
    }

    function weightTrendReview(records, weeklyChange) {
      const latestWeight = latestWeightValue(records);
      if (weeklyChange === null || latestWeight === null || latestWeight <= 0) return "";
      if (Math.abs(weeklyChange) <= 0.1) return "稳定 · 波动很小";
      if (weeklyChange > 0) return "回升中 · 看看热量和活动";

      const weeklyLossPercent = Math.abs(weeklyChange) / latestWeight * 100;
      const percentText = `${roundValue(weeklyLossPercent)}%/周`;

      if (weeklyLossPercent < 0.25) return `偏慢 · 约 ${percentText}`;
      if (weeklyLossPercent < 0.5) return `良好 · 约 ${percentText}`;
      if (weeklyLossPercent <= 1) return `优秀 · 约 ${percentText}`;
      if (weeklyLossPercent <= 1.5) return `偏快 · 约 ${percentText}`;
      return `过于激进 · 约 ${percentText}`;
    }

    function daysBetween(startDate, endDate) {
      const start = new Date(`${startDate}T00:00:00`);
      const end = new Date(`${endDate}T00:00:00`);
      return Math.round((end - start) / 86400000);
    }

    function formatSignedValue(value) {
      const rounded = roundValue(value);
      return value > 0 ? `+${rounded}` : rounded;
    }

    function statCard(name, value, unit, note = "") {
      return `
        <div class="stat">
          <div class="stat-name">${name}</div>
          <div class="stat-value">${value}</div>
          <div class="stat-unit">${unit}</div>
          ${note ? `<div class="stat-note">${note}</div>` : ""}
        </div>
      `;
    }

    function renderCharts(sorted) {
      if (!sorted.length) {
        charts.innerHTML = "";
        return;
      }

      const ranged = chartRange && sorted.length > chartRange
        ? sorted.slice(-chartRange)
        : sorted;

      const intakeValues = ranged.map((record, index) => ({ index, date: record.date, value: record.intake }));
      const targetIntake = dailyTargets.intake && Number(dailyTargets.intake) > 0 ? Number(dailyTargets.intake) : null;
      const extraCharts = [
        compactMetricCard(ranged, "weight", "体重", "kg", "var(--green)", "#34c759"),
        compactMetricCard(ranged, "protein", "蛋白质", "g", "var(--orange)", "#ff9500")
      ].filter(Boolean).join("");

      charts.innerHTML = makeIntakeOverview(ranged, intakeValues, targetIntake, sorted.length) + extraCharts;
    }

    function makeIntakeOverview(records, values, targetIntake, totalCount) {
      const averageValues = movingAverage(values, 7);
      const latest = values[values.length - 1].value;
      const average = Math.round(values.reduce((sum, point) => sum + point.value, 0) / values.length);
      const highest = values.reduce((max, point) => point.value > max.value ? point : max, values[0]);
      const lowest = values.reduce((min, point) => point.value < min.value ? point : min, values[0]);
      const rangeLabel = totalCount > records.length ? `最近 ${records.length} 天` : `${records.length} 天全部显示`;
      const activeRange = chartRange || 0;

      const chartContent = chartView === "bar"
        ? makeWeeklyBarChart(records, targetIntake)
        : makeCompactChart(records, values, averageValues, "#8ec5ff", "#0057d9", "kcal", targetIntake);

      const legendContent = chartView === "bar"
        ? (targetIntake ? `<span class="legend-item"><span class="legend-line" style="height:2px;background:var(--red);border-style:dashed"></span>目标 ${targetIntake} kcal</span>` : "")
        : `<span class="legend-item"><span class="legend-line" style="background:#8ec5ff"></span>每天</span>
            <span class="legend-item"><span class="legend-line" style="height:5px;background:#0057d9"></span>7天平均</span>
            ${targetIntake ? `<span class="legend-item"><span class="legend-line" style="height:2px;background:var(--red);border-style:dashed"></span>目标 ${targetIntake} kcal</span>` : ""}`;

      return `
        <div class="chart-card">
          <div class="chart-head">
            <h3 class="chart-title"><span class="dot" style="background:var(--blue)"></span>摄入总览</h3>
            <div class="chart-range-btns">
              <button class="range-btn${chartView === "line" ? " active" : ""}" type="button" data-view="line">折线</button>
              <button class="range-btn${chartView === "bar" ? " active" : ""}" type="button" data-view="bar">周均</button>
            </div>
            <div class="chart-range-btns">
              <button class="range-btn${activeRange === 7 ? " active" : ""}" type="button" data-range="7">7天</button>
              <button class="range-btn${activeRange === 30 ? " active" : ""}" type="button" data-range="30">30天</button>
              <button class="range-btn${activeRange === 0 ? " active" : ""}" type="button" data-range="0">全部</button>
            </div>
            <span class="chart-note">${rangeLabel}</span>
          </div>
          <div class="trend-summary">
            <div class="trend-chip"><span>最近一天</span><strong>${latest} kcal</strong></div>
            <div class="trend-chip"><span>平均摄入</span><strong>${average} kcal</strong></div>
            <div class="trend-chip"><span>范围</span><strong>${lowest.value}-${highest.value}</strong></div>
          </div>
          <div class="legend">${legendContent}</div>
          <div class="chart-frame">${chartContent}</div>
        </div>
      `;
    }

    function compactMetricCard(records, key, label, unit, colorVar, color) {
      const values = records
        .map((record, index) => ({ index, date: record.date, value: record[key] }))
        .filter((point) => point.value !== "" && Number.isFinite(Number(point.value)));

      if (!values.length) return "";

      const activeRange = chartRange || 0;

      return `
        <div class="chart-card">
          <div class="chart-head">
            <h3 class="chart-title"><span class="dot" style="background:${colorVar}"></span>${label}</h3>
            <div class="chart-range-btns">
              <button class="range-btn${activeRange === 7 ? " active" : ""}" type="button" data-range="7">7天</button>
              <button class="range-btn${activeRange === 30 ? " active" : ""}" type="button" data-range="30">30天</button>
              <button class="range-btn${activeRange === 0 ? " active" : ""}" type="button" data-range="0">全部</button>
            </div>
            <span class="chart-note">${values.length} 个点</span>
          </div>
          <div class="chart-frame">${makeCompactChart(records, values, [], color, color, unit)}</div>
        </div>
      `;
    }

    function makeWeeklyBarChart(records, targetIntake) {
      const width = 760;
      const height = 250;
      const pad = { top: 22, right: 24, bottom: 46, left: 54 };

      const weeks = [];
      for (let i = 0; i < records.length; i += 7) {
        const chunk = records.slice(i, i + 7);
        const avg = Math.round(chunk.reduce((s, r) => s + Number(r.intake), 0) / chunk.length);
        weeks.push({
          label: `${chunk[0].date.slice(5)}-${chunk[chunk.length - 1].date.slice(5)}`,
          avg,
          count: chunk.length
        });
      }

      if (!weeks.length) return "";

      const maxVal = Math.max(...weeks.map(w => w.avg), targetIntake || 0);
      const minVal = Math.min(...weeks.map(w => w.avg));
      const gap = Math.max((maxVal - minVal) * 0.12, 50);
      const yMin = Math.max(0, minVal - gap);
      const yMax = maxVal + gap;
      const range = yMax - yMin || 1;
      const bottom = height - pad.bottom;
      const plotWidth = width - pad.left - pad.right;
      const barWidth = Math.max(16, Math.min(60, (plotWidth / weeks.length) * 0.7));
      const gapX = (plotWidth - barWidth * weeks.length) / (weeks.length + 1);

      const y = (value) => bottom - ((Number(value) - yMin) / range) * (height - pad.top - pad.bottom);

      const bars = weeks.map((w, i) => {
        const bx = pad.left + gapX + i * (barWidth + gapX);
        const by = y(w.avg);
        const bh = bottom - by;
        return `<rect x="${bx}" y="${by}" width="${barWidth}" height="${bh}" rx="4" fill="#8ec5ff" opacity="0.85">
          <title>${w.label}: ${w.avg} kcal (${w.count}天)</title>
        </rect>
        <text x="${bx + barWidth / 2}" y="${by - 6}" text-anchor="middle" fill="var(--muted)" font-size="10">${w.avg}</text>`;
      }).join("");

      const targetLine = targetIntake && targetIntake >= yMin && targetIntake <= yMax
        ? `<line x1="${pad.left}" y1="${y(targetIntake)}" x2="${width - pad.right}" y2="${y(targetIntake)}" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.7"></line>`
        : "";

      const xLabels = weeks.map((w, i) => {
        const bx = pad.left + gapX + i * (barWidth + gapX) + barWidth / 2;
        const label = weeks.length > 10 ? w.label.slice(5) : w.label;
        return `<text x="${bx}" y="${height - 12}" text-anchor="middle" fill="var(--muted)" font-size="10" transform="rotate(-25, ${bx}, ${height - 12})">${label}</text>`;
      }).join("");

      return `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="周均柱状图">
          <rect x="0" y="0" width="${width}" height="${height}" rx="18" fill="var(--chart-bg)"></rect>
          <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${bottom}" stroke="var(--line)"></line>
          <line x1="${pad.left}" y1="${bottom}" x2="${width - pad.right}" y2="${bottom}" stroke="var(--line)"></line>
          <text x="${pad.left - 10}" y="${pad.top + 5}" text-anchor="end" fill="var(--muted)" font-size="12">${yMax}</text>
          <text x="${pad.left - 10}" y="${bottom + 4}" text-anchor="end" fill="var(--muted)" font-size="12">${yMin}</text>
          ${targetLine}
          ${bars}
          ${xLabels}
        </svg>
      `;
    }

    function movingAverage(values, days) {
      return values.map((point, index) => {
        const start = Math.max(0, index - days + 1);
        const group = values.slice(start, index + 1);
        const average = group.reduce((sum, item) => sum + Number(item.value), 0) / group.length;
        return { index: point.index, date: point.date, value: Math.round(average) };
      });
    }

    function chartMinimumGap(unit) {
      if (unit === "kg") return 0.5;
      if (unit === "g") return 5;
      return 50;
    }

    function makeCompactChart(records, values, averageValues, color, averageColor, unit, targetValue) {
      const width = 760;
      const height = 250;
      const pad = { top: 22, right: 24, bottom: 46, left: 54 };
      const allValues = values.concat(averageValues);
      const minRaw = Math.min(...allValues.map((point) => Number(point.value)));
      const maxRaw = Math.max(...allValues.map((point) => Number(point.value)));
      const gap = Math.max((maxRaw - minRaw) * 0.12, chartMinimumGap(unit));
      const min = Math.max(0, minRaw - gap);
      const max = maxRaw + gap;
      const range = max - min || 1;
      const bottom = height - pad.bottom;
      const plotWidth = width - pad.left - pad.right;

      const x = (index) => {
        if (records.length === 1) return pad.left + plotWidth / 2;
        return pad.left + (index / (records.length - 1)) * plotWidth;
      };
      const y = (value) => bottom - ((Number(value) - min) / range) * (height - pad.top - pad.bottom);
      const dailyPath = makePath(values, x, y);
      const averagePath = makePath(averageValues, x, y);
      const fillId = `chartFill${color.replace(/[^a-z0-9]/gi, "")}${unit}`;
      const area = values.length > 1
        ? `${dailyPath} L ${x(values[values.length - 1].index)} ${bottom} L ${x(values[0].index)} ${bottom} Z`
        : "";

      const labels = makeDateLabels(records, x, height);
      const points = values.length <= 14
        ? values.map((point) => `<circle cx="${x(point.index)}" cy="${y(point.value)}" r="4" fill="#fff" stroke="${color}" stroke-width="2.5"></circle>`).join("")
        : "";
      const hoverPoints = makeHoverPoints(values, x, y, bottom, pad, width, unit, color);

      return `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="趋势图">
          <defs>
            <linearGradient id="${fillId}" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stop-color="${color}" stop-opacity="0.28"></stop>
              <stop offset="100%" stop-color="${color}" stop-opacity="0.02"></stop>
            </linearGradient>
          </defs>
          <rect x="0" y="0" width="${width}" height="${height}" rx="18" fill="var(--chart-bg)"></rect>
          <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${bottom}" stroke="var(--line)"></line>
          <line x1="${pad.left}" y1="${bottom}" x2="${width - pad.right}" y2="${bottom}" stroke="var(--line)"></line>
          <line x1="${pad.left}" y1="${y((max + min) / 2)}" x2="${width - pad.right}" y2="${y((max + min) / 2)}" stroke="var(--line)" stroke-dasharray="6 8"></line>
          ${targetValue !== null && targetValue >= min && targetValue <= max ? `<line x1="${pad.left}" y1="${y(targetValue)}" x2="${width - pad.right}" y2="${y(targetValue)}" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.7"></line>` : ""}
          <text x="${pad.left - 10}" y="${pad.top + 5}" text-anchor="end" fill="var(--muted)" font-size="12">${roundValue(maxRaw)}</text>
          <text x="${pad.left - 10}" y="${bottom + 4}" text-anchor="end" fill="var(--muted)" font-size="12">${roundValue(minRaw)}</text>
          ${area ? `<path d="${area}" fill="url(#${fillId})"></path>` : ""}
          <path d="${dailyPath}" fill="none" stroke="${color}" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"></path>
          ${averagePath ? `<path d="${averagePath}" fill="none" stroke="${averageColor}" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>` : ""}
          ${points}
          ${labels}
          ${hoverPoints}
          <title>${records[0].date} 到 ${records[records.length - 1].date}，单位 ${unit}</title>
        </svg>
      `;
    }

    function makeHoverPoints(values, x, y, bottom, pad, width, unit, color) {
      const tooltipWidth = 108;
      const tooltipHeight = 42;

      return values.map((point, index) => {
        const pointX = x(point.index);
        const pointY = y(point.value);
        const previousX = index === 0 ? pad.left : (x(values[index - 1].index) + pointX) / 2;
        const nextX = index === values.length - 1 ? width - pad.right : (pointX + x(values[index + 1].index)) / 2;
        const hitX = Math.max(pad.left, previousX);
        const hitWidth = Math.max(8, Math.min(width - pad.right, nextX) - hitX);
        const tooltipX = Math.min(Math.max(pointX - tooltipWidth / 2, pad.left + 4), width - pad.right - tooltipWidth - 4);
        const aboveY = pointY - tooltipHeight - 14;
        const tooltipY = aboveY < pad.top ? pointY + 14 : aboveY;
        const valueText = `${roundValue(Number(point.value))} ${unit}`;

        return `
          <g class="hover-point" tabindex="0" aria-label="${point.date} ${valueText}">
            <rect class="chart-hover-region" x="${hitX}" y="${pad.top}" width="${hitWidth}" height="${bottom - pad.top}"></rect>
            <line class="chart-focus-line" x1="${pointX}" y1="${pad.top}" x2="${pointX}" y2="${bottom}" stroke="${color}" stroke-dasharray="3 5"></line>
            <circle class="chart-focus-dot" cx="${pointX}" cy="${pointY}" r="5.5" fill="#fff" stroke="${color}" stroke-width="2.5"></circle>
            <g class="point-tooltip" transform="translate(${tooltipX} ${tooltipY})">
              <rect width="${tooltipWidth}" height="${tooltipHeight}" rx="8"></rect>
              <text class="tooltip-date" x="10" y="16">${point.date}</text>
              <text class="tooltip-value" x="10" y="32">${valueText}</text>
            </g>
          </g>
        `;
      }).join("");
    }

    function makePath(values, x, y) {
      if (!values.length) return "";
      return values.map((point, index) => {
        const prefix = index === 0 ? "M" : "L";
        return `${prefix} ${x(point.index)} ${y(point.value)}`;
      }).join(" ");
    }

    function makeDateLabels(records, x, height) {
      const positions = records.length <= 3
        ? records.map((record, index) => index)
        : [0, Math.floor((records.length - 1) / 2), records.length - 1];

      return positions.map((index) => `
        <text x="${x(index)}" y="${height - 18}" text-anchor="middle" fill="var(--muted)" font-size="12">${records[index].date.slice(5)}</text>
      `).join("");
    }

    function roundValue(value) {
      return Number(value).toFixed(Number.isInteger(value) ? 0 : 1);
    }

    function renderCalendar() {
      const firstDay = new Date(calendarYear, calendarMonth, 1);
      const lastDay = new Date(calendarYear, calendarMonth + 1, 0);
      const startWeekday = firstDay.getDay();
      const daysInMonth = lastDay.getDate();
      const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
      monthTitle.textContent = `${calendarYear}年${calendarMonth + 1}月`;

      const cells = weekdays.map((day) => `<div class="weekday">${day}</div>`);
      for (let i = 0; i < startWeekday; i += 1) {
        cells.push(`<button class="day empty" type="button" disabled></button>`);
      }
      for (let day = 1; day <= daysInMonth; day += 1) {
        const date = `${calendarYear}-${String(calendarMonth + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        const record = recordsByDate.get(date);
        const status = targetStatusForRecord(record);
        const targetDots = targetDotsForRecord(record);
        const classes = [
          "day",
          record ? "has-record" : "",
          date === selectedDate ? "selected" : "",
          date === today ? "today" : ""
        ].filter(Boolean).join(" ");
        const actionText = record ? "编辑当天记录" : "新增当天记录";
        const statusText = status ? `，目标${status.label}：${status.details.join("，")}` : "";
        cells.push(`<button class="${classes}" type="button" data-date="${date}" title="点击${actionText}${statusText}" aria-label="${formatDateText(date)}，点击${actionText}${statusText}">${day}${targetDots}</button>`);
      }
      calendar.innerHTML = cells.join("");
      calendar.classList.remove("calendar-slide");
      void calendar.offsetWidth;
      calendar.classList.add("calendar-slide");
    }

    function targetStatusForRecord(record) {
      if (!record) return null;

      const checks = targetChecksForRecord(record);

      if (!checks.length) return null;

      const levelRank = { good: 0, warn: 1, low: 2, none: 3 };
      const worst = checks.reduce((current, item) => (
        levelRank[item.level] > levelRank[current.level] ? item : current
      ), checks[0]);

      return {
        level: worst.level,
        label: worst.label,
        details: checks.map((item) => item.text)
      };
    }

    function targetChecksForRecord(record) {
      if (!record) return [];
      const checks = [
        metricTargetStatus("热量", record.intake, dailyTargets.intake, "kcal"),
        metricTargetStatus("蛋白", record.protein, dailyTargets.protein, "g"),
        metricTargetStatus("饮水", record.water === undefined ? "" : record.water, dailyTargets.water, "ml")
      ].filter(Boolean);
      if (record.weight !== "" && record.weight !== undefined && Number(record.weight) > 0) {
        checks.push({ key: "weight", level: "good", label: "已记录", text: `体重 ${record.weight} kg`, ratio: null });
      }
      return checks;
    }

    function targetDotsForRecord(record) {
      const checks = targetChecksForRecord(record);
      if (!checks.length) return "";

      const dots = checks.map((check) => (
        `<span class="target-marker metric-${check.key} target-status-${check.level}" title="${check.text}"></span>`
      )).join("");
      return `<span class="day-target-dots" aria-hidden="true">${dots}</span>`;
    }

    function metricTargetStatus(name, value, target, unit) {
      if (target === "" || !Number.isFinite(Number(target)) || Number(target) <= 0) return null;

      const keyMap = { "热量": "intake", "蛋白": "protein", "饮水": "water" };
      const key = keyMap[name] || "intake";
      const labels = { good: "达标", warn: "稍低", low: "偏低", none: "未填" };
      if (value === "" || !Number.isFinite(Number(value))) {
        return {
          level: "none",
          label: labels.none,
          ratio: null,
          actual: null,
          target: Number(target),
          unit,
          name,
          key,
          text: `${name}未填，目标 ${roundValue(Number(target))}${unit}`
        };
      }

      const actual = Number(value);
      const ratio = actual / Number(target);
      const level = ratio >= 1 ? "good" : ratio >= 0.7 ? "warn" : "low";
      return {
        level,
        label: labels[level],
        ratio,
        actual,
        target: Number(target),
        unit,
        name,
        key,
        text: `${name}${labels[level]} ${roundValue(actual)}/${roundValue(Number(target))}${unit}`
      };
    }

    function renderTargetProgress() {
      const intake = readNumber(intakeInput.value, false);
      const protein = readNumber(proteinInput.value, false);
      const checks = targetChecksForRecord({
        intake: intake === null ? "" : intake,
        protein: protein === null ? "" : protein
      });

      if (!checks.length) {
        targetProgress.innerHTML = `<div class="empty-state" style="grid-column: 1 / -1;">先设置每日热量或蛋白目标，这里会显示当天达成度。</div>`;
        return;
      }

      targetProgress.innerHTML = checks.map((check) => {
        const percent = check.ratio === null ? null : Math.round(check.ratio * 100);
        const width = percent === null ? 100 : Math.min(100, Math.max(0, percent));
        const valueText = check.actual === null ? "未填" : `${roundValue(check.actual)} / ${roundValue(check.target)} ${check.unit}`;
        return `
          <div class="target-progress-card">
            <span>${check.name}达成度</span>
            <strong>${percent === null ? "未填" : `${percent}%`}</strong>
            <div class="target-progress-track">
              <div class="target-progress-fill target-status-${check.level}" style="width:${width}%"></div>
            </div>
            <span>${valueText}</span>
          </div>
        `;
      }).join("");
    }

    function renderReview() {
      const record = recordsByDate.get(selectedDate);
      if (!record) {
        reviewBox.innerHTML = `
          <p class="review-date">${formatDateText(selectedDate)}</p>
          <div class="empty-state">这一天还没有记录。</div>
        `;
        return;
      }

      const waterVal = record.water === "" || record.water === undefined ? "未填" : `${record.water} ml`;
      const bmi = calculateBMI(record.weight, dailyTargets.height);
      const bmiText = bmi === null ? "" : `<div class="mini"><span>BMI</span><strong>${roundValue(bmi)} ${bmiCategory(bmi)}</strong></div>`;

      reviewBox.innerHTML = `
        <p class="review-date">${formatDateText(record.date)}</p>
        <div class="review-values">
          <div class="mini"><span>摄入</span><strong>${record.intake} kcal</strong></div>
          <div class="mini"><span>体重</span><strong>${record.weight === "" ? "未填" : `${record.weight} kg`}</strong></div>
          <div class="mini"><span>蛋白质</span><strong>${record.protein === "" ? "未填" : `${record.protein} g`}</strong></div>
          <div class="mini"><span>饮水</span><strong>${waterVal}</strong></div>
          ${bmiText}
        </div>
      `;
    }

    function renderRecords(sorted) {
      if (!sorted.length) {
        recordsBox.innerHTML = `<div class="empty-state"><svg width="48" height="48" viewBox="0 0 48 48" fill="none" style="margin-bottom:8px;opacity:0.5"><rect x="8" y="12" width="32" height="28" rx="4" stroke="var(--muted)" stroke-width="2"/><line x1="16" y1="22" x2="32" y2="22" stroke="var(--muted)" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="28" x2="28" y2="28" stroke="var(--muted)" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="34" x2="24" y2="34" stroke="var(--muted)" stroke-width="2" stroke-linecap="round"/></svg><br>还没有任何记录。</div>`;
        return;
      }

      recordsBox.innerHTML = sorted.slice().reverse().map((record) => `
        <div class="record">
          <div class="record-date">${record.date}</div>
          <div class="record-value">摄入<strong>${record.intake} kcal</strong></div>
          <div class="record-value">体重<strong>${record.weight === "" ? "未填" : `${record.weight} kg`}</strong></div>
          <div class="record-value">蛋白质<strong>${record.protein === "" ? "未填" : `${record.protein} g`}</strong></div>
          <div class="record-value">饮水<strong>${(record.water === "" || record.water === undefined) ? "未填" : `${record.water} ml`}</strong></div>
          <div class="record-actions">
            <button class="link-btn" type="button" data-edit="${record.date}">查看/修改</button>
            <button class="link-btn delete-btn" type="button" data-delete="${record.date}">删除</button>
          </div>
        </div>
      `).join("");
    }

    function isImportHeaderLine(line) {
      return /日期/.test(line) && /摄入|热量|卡路里|大卡|千卡|kcal/i.test(line);
    }

    function findDateInImportLine(line) {
      const fullDate = line.match(/(\d{4})\s*(?:年|[./\-、])\s*(\d{1,2})\s*(?:月|[./\-、])\s*(\d{1,2})\s*日?/);
      if (fullDate) {
        return {
          date: normalizeDate(`${fullDate[1]}-${fullDate[2]}-${fullDate[3]}`),
          index: fullDate.index,
          raw: fullDate[0]
        };
      }

      const shortDate = line.match(/(\d{1,2})\s*(?:月\s*(\d{1,2})\s*日?|[./\-、]\s*(\d{1,2}))/);
      if (shortDate) {
        return {
          date: normalizeDate(`${shortDate[1]}-${shortDate[2] || shortDate[3]}`),
          index: shortDate.index,
          raw: shortDate[0]
        };
      }

      return { date: "", index: -1, raw: "" };
    }

    function readImportNumbers(text) {
      return String(text ?? "")
        .replace(/[：:=]/g, " ")
        .replace(/[，,;；|\t]/g, " ")
        .replace(/(千卡|大卡|卡路里|kcal|cal|公斤|千克|kg|克|g)/gi, " ")
        .match(/\d+(?:\.\d+)?/g) || [];
    }

    function parseImportLine(line) {
      const dateInfo = findDateInImportLine(line);
      if (!dateInfo.date) return { date: "", intake: null, weight: "", protein: "" };

      const afterDate = line.slice(dateInfo.index + dateInfo.raw.length);
      const beforeDate = line.slice(0, dateInfo.index);
      const numbers = readImportNumbers(afterDate);
      const fallbackNumbers = numbers.length ? numbers : readImportNumbers(beforeDate);
      const intake = readNumber(fallbackNumbers[0] ?? "", true);
      const weight = readNumber(fallbackNumbers[1] ?? "", false);
      const protein = readNumber(fallbackNumbers[2] ?? "", false);

      return { date: dateInfo.date, intake, weight, protein };
    }

    function parseImportRows(text) {
      const lines = text.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
      const records = [];
      const errors = [];

      lines.forEach((line, index) => {
        if (isImportHeaderLine(line)) return;

        const result = parseImportLine(line);
        const { date, intake, weight, protein } = result;
        const rowNumber = index + 1;

        if (!date) errors.push(`第 ${rowNumber} 行：日期不正确`);
        if (intake === null) errors.push(`第 ${rowNumber} 行：摄入必须填写数字`);
        if (weight === null) errors.push(`第 ${rowNumber} 行：体重需要是数字或留空`);
        if (protein === null) errors.push(`第 ${rowNumber} 行：蛋白质需要是数字或留空`);

        if (date && intake !== null && weight !== null && protein !== null) {
          records.push({ date, intake, weight, protein });
        }
      });

      return { records, errors };
    }

    function renderImportPreview(records) {
      pendingImportRecords = records;
      const rows = records.map((record) => {
        const status = recordsByDate.has(record.date) ? "会覆盖" : "新增";
        return `
          <div class="import-preview-row">
            <div>日期<strong>${record.date}</strong></div>
            <div>摄入<strong>${record.intake} kcal</strong></div>
            <div class="import-preview-badge">${status}</div>
          </div>
        `;
      }).join("");

      importPreview.innerHTML = `
        <p class="import-preview-title">请先确认下面这些记录是否正确</p>
        <div class="import-preview-list">${rows}</div>
      `;
      importPreview.classList.add("show");
    }

    function showPetSpeech() {
      let nextIndex = Math.floor(Math.random() * PET_LINES.length);
      if (nextIndex === lastPetLineIndex && PET_LINES.length > 1) {
        nextIndex = (nextIndex + 1) % PET_LINES.length;
      }

      lastPetLineIndex = nextIndex;
      petSpeech.textContent = PET_LINES[nextIndex];
      petSpeech.classList.remove("show");
      petButton.classList.remove("is-talking");

      window.requestAnimationFrame(() => {
        petSpeech.classList.add("show");
        petButton.classList.add("is-talking");
      });

      window.clearTimeout(petSpeechTimer);
      petSpeechTimer = window.setTimeout(() => {
        petSpeech.classList.remove("show");
        petButton.classList.remove("is-talking");
      }, 6500);
    }

    document.querySelector("#recordForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const result = recordFromInputs();
      if (result.error) {
        setMessage(formMessage, result.error, "error");
        return;
      }

      recordsByDate.set(result.date, result);
      selectedDate = result.date;
      calendarYear = Number(result.date.slice(0, 4));
      calendarMonth = Number(result.date.slice(5, 7)) - 1;
      saveRecords();
      render();
      setMessage(formMessage, `已保存 ${formatDateText(result.date)} 的记录，顶部状态和趋势也更新了。`, "success");
      recordForm.classList.remove("save-pulse");
      void recordForm.offsetWidth;
      recordForm.classList.add("save-pulse");
    });

    document.querySelector("#clearFormBtn").addEventListener("click", () => {
      clearFormForDate(today);
      selectedDate = today;
      setMessage(formMessage, "", "");
      render();
    });

    document.querySelector("#importBtn").addEventListener("click", () => {
      const text = importText.value.trim();
      if (!text) {
        clearImportPreview();
        setMessage(importMessage, "请先粘贴要导入的数据。", "error");
        return;
      }

      const result = parseImportRows(text);
      if (result.errors.length) {
        clearImportPreview();
        setMessage(importMessage, result.errors.slice(0, 4).join("；"), "error");
        return;
      }
      if (!result.records.length) {
        clearImportPreview();
        setMessage(importMessage, "没有找到可以导入的数据。", "error");
        return;
      }

      renderImportPreview(result.records);
      setMessage(importMessage, `已识别 ${result.records.length} 条记录。预览里标着“新增”或“会覆盖”，确认无误后再点“确认录入”。`, "success");
    });

    confirmImportBtn.addEventListener("click", () => {
      if (!pendingImportRecords.length) {
        setMessage(importMessage, "请先点“先预览”，确认页面识别正确。", "error");
        return;
      }

      pendingImportRecords.forEach((record) => recordsByDate.set(record.date, record));
      selectedDate = pendingImportRecords[pendingImportRecords.length - 1].date;
      calendarYear = Number(selectedDate.slice(0, 4));
      calendarMonth = Number(selectedDate.slice(5, 7)) - 1;
      saveRecords();
      render();
      setMessage(importMessage, `已录入 ${pendingImportRecords.length} 条记录，日历和趋势已经一起更新。`, "success");
      clearImportPreview();
    });

    document.querySelector("#clearImportBtn").addEventListener("click", () => {
      importText.value = "";
      clearImportPreview();
      setMessage(importMessage, "", "");
    });

    importText.addEventListener("input", () => {
      clearImportPreview();
      setMessage(importMessage, "", "");
    });

    document.querySelector("#exportBtn").addEventListener("click", () => {
      const sorted = getSortedRecords();
      if (!sorted.length) {
        showToast("没有数据可以导出。", "error");
        return;
      }
      const header = "日期,摄入(kcal),体重(kg),蛋白质(g),饮水(ml)";
      const rows = sorted.map(r => [
        r.date,
        r.intake || "",
        r.weight || "",
        r.protein || "",
        r.water || ""
      ].join(","));
      const csv = "﻿" + header + "\n" + rows.join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `每日饮食_${today}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      showToast(`已导出 ${sorted.length} 条记录。`, "success");
    });

    document.querySelector("#fileImportInput").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const content = ev.target.result;
        let records = [];
        if (file.name.endsWith(".json")) {
          try {
            const data = JSON.parse(content);
            if (Array.isArray(data)) {
              records = data.filter(r => r.date && isValidDate(r.date)).map(r => ({
                date: r.date,
                intake: String(r.intake || ""),
                weight: String(r.weight || ""),
                protein: String(r.protein || ""),
                water: String(r.water || "")
              }));
            }
          } catch {
            showToast("JSON 格式错误。", "error");
            e.target.value = "";
            return;
          }
        } else {
          const lines = content.split("\n").map(l => l.trim()).filter(l => l);
          const startLine = lines[0].includes("日期") ? 1 : 0;
          const text = lines.slice(startLine).join("\n");
          const result = parseImportRows(text);
          if (result.errors.length) {
            showToast(result.errors.slice(0, 2).join("；"), "error");
            e.target.value = "";
            return;
          }
          records = result.records;
        }
        if (!records.length) {
          showToast("文件中没有找到有效记录。", "error");
          e.target.value = "";
          return;
        }
        records.forEach(r => recordsByDate.set(r.date, r));
        selectedDate = records[records.length - 1].date;
        calendarYear = Number(selectedDate.slice(0, 4));
        calendarMonth = Number(selectedDate.slice(5, 7)) - 1;
        saveRecords();
        render();
        showToast(`已从文件导入 ${records.length} 条记录。`, "success");
        e.target.value = "";
      };
      reader.readAsText(file);
    });

    document.querySelector("#prevMonthBtn").addEventListener("click", () => {
      calendarMonth -= 1;
      if (calendarMonth < 0) {
        calendarMonth = 11;
        calendarYear -= 1;
      }
      renderCalendar();
    });

    document.querySelector("#nextMonthBtn").addEventListener("click", () => {
      calendarMonth += 1;
      if (calendarMonth > 11) {
        calendarMonth = 0;
        calendarYear += 1;
      }
      renderCalendar();
    });

    document.addEventListener("keydown", (e) => {
      const tag = e.target.tagName;
      const isInput = tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT";

      if ((e.ctrlKey || e.metaKey) && e.key === "s") {
        e.preventDefault();
        document.querySelector("#recordForm").requestSubmit();
        return;
      }

      if (isInput) return;

      if (e.key === "ArrowLeft") {
        calendarMonth -= 1;
        if (calendarMonth < 0) { calendarMonth = 11; calendarYear -= 1; }
        renderCalendar();
      } else if (e.key === "ArrowRight") {
        calendarMonth += 1;
        if (calendarMonth > 11) { calendarMonth = 0; calendarYear += 1; }
        renderCalendar();
      } else if (e.key === "t" || e.key === "T") {
        calendarYear = Number(today.slice(0, 4));
        calendarMonth = Number(today.slice(5, 7)) - 1;
        selectedDate = today;
        render();
      }
    });

    calendar.addEventListener("click", (event) => {
      const button = event.target.closest("[data-date]");
      if (!button) return;
      selectedDate = button.dataset.date;
      const record = recordsByDate.get(selectedDate);
      if (record) {
        fillForm(record);
        setMessage(formMessage, "已载入这一天的记录，可以直接修改后保存。", "success");
      } else {
        clearFormForDate(selectedDate);
        setMessage(formMessage, "已选择这一天。填写摄入后点保存，就会新增当天记录。", "success");
      }
      render();
      intakeInput.focus();
    });

    let touchStartX = 0;
    calendar.addEventListener("touchstart", (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });
    calendar.addEventListener("touchend", (e) => {
      const diff = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(diff) < 50) return;
      if (diff > 0) {
        calendarMonth -= 1;
        if (calendarMonth < 0) { calendarMonth = 11; calendarYear -= 1; }
      } else {
        calendarMonth += 1;
        if (calendarMonth > 11) { calendarMonth = 0; calendarYear += 1; }
      }
      renderCalendar();
    }, { passive: true });

    recordsBox.addEventListener("click", (event) => {
      const editBtn = event.target.closest("[data-edit]");
      if (editBtn) {
        selectedDate = editBtn.dataset.edit;
        calendarYear = Number(selectedDate.slice(0, 4));
        calendarMonth = Number(selectedDate.slice(5, 7)) - 1;
        fillForm(recordsByDate.get(selectedDate));
        setMessage(formMessage, "已把这一天的数据放到左侧，可以直接修改后保存。", "success");
        render();
        return;
      }
      const deleteBtn = event.target.closest("[data-delete]");
      if (deleteBtn) {
        const date = deleteBtn.dataset.delete;
        if (!confirm(`确定要删除 ${date} 的记录吗？`)) return;
        recordsByDate.delete(date);
        saveRecords();
        render();
        showToast(`已删除 ${date} 的记录。`, "success");
      }
    });

    petButton.addEventListener("click", showPetSpeech);
    charts.addEventListener("click", (event) => {
      const rangeBtn = event.target.closest("[data-range]");
      if (rangeBtn) {
        chartRange = Number(rangeBtn.dataset.range);
        render();
        return;
      }
      const viewBtn = event.target.closest("[data-view]");
      if (viewBtn) {
        chartView = viewBtn.dataset.view;
        render();
      }
    });
    saveTargetsBtn.addEventListener("click", saveTargets);
    [intakeInput, proteinInput].forEach((input) => {
      input.addEventListener("input", renderTargetProgress);
    });

    // Dark mode toggle
    const themeToggle = document.querySelector("#themeToggle");
    const THEME_KEY = "dailyDietThemeV1";

    function applyTheme(theme) {
      if (theme === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
        themeToggle.textContent = "☀️";
      } else {
        document.documentElement.removeAttribute("data-theme");
        themeToggle.textContent = " ";
      }
    }

    function initTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      if (saved) {
        applyTheme(saved);
      } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        applyTheme("dark");
      } else {
        applyTheme("light");
      }
    }

    themeToggle.addEventListener("click", () => {
      const isDark = document.documentElement.getAttribute("data-theme") === "dark";
      const next = isDark ? "light" : "dark";
      applyTheme(next);
      localStorage.setItem(THEME_KEY, next);
    });

    initTheme();

    loadTargets();
    loadRecords();
    if (recordsByDate.has(today)) {
      fillForm(recordsByDate.get(today));
    } else {
      dateInput.value = today;
    }
    todayText.textContent = `今天：${formatDateText(today)}`;
    render();
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
