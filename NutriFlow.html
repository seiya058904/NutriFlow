<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a84ff">
  <title>每日饮食记录</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: rgba(255, 255, 255, 0.78);
      --text: #1d1d1f;
      --muted: #69707d;
      --soft: #8a94a6;
      --line: rgba(88, 96, 115, 0.16);
      --blue: #0a84ff;
      --blue-deep: #0066d6;
      --green: #30d158;
      --orange: #ff9f0a;
      --red: #ff453a;
      --violet: #5e5ce6;
      --glass: rgba(255, 255, 255, 0.72);
      --shadow: 0 24px 70px rgba(30, 41, 59, 0.12);
      --shadow-soft: 0 10px 28px rgba(30, 41, 59, 0.08);
      --radius: 24px;
      --chart-bg: #fbfbfd;
      --input-bg: rgba(255, 255, 255, 0.86);
      --btn-secondary-bg: rgba(236, 239, 245, 0.94);
      --toast-bg: rgba(255, 255, 255, 0.96);
    }

    [data-theme="dark"] {
      --bg: #1c1c1e;
      --panel: rgba(44, 44, 46, 0.82);
      --text: #f5f5f7;
      --muted: #98989d;
      --soft: #636366;
      --line: rgba(255, 255, 255, 0.12);
      --blue: #0a84ff;
      --blue-deep: #409cff;
      --green: #30d158;
      --orange: #ff9f0a;
      --red: #ff453a;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.4);
      --shadow-soft: 0 10px 28px rgba(0, 0, 0, 0.3);
      --chart-bg: #2c2c2e;
      --input-bg: rgba(58, 58, 60, 0.86);
      --btn-secondary-bg: rgba(58, 58, 60, 0.94);
      --toast-bg: rgba(44, 44, 46, 0.96);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 14% 8%, rgba(10, 132, 255, 0.15), transparent 30%),
        radial-gradient(circle at 86% 0%, rgba(48, 209, 88, 0.13), transparent 28%),
        linear-gradient(180deg, #fbfcff 0%, var(--bg) 44%, #eef2f8 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
      transition: background 0.3s ease, color 0.3s ease;
    }

    [data-theme="dark"] body {
      background:
        radial-gradient(circle at 14% 8%, rgba(10, 132, 255, 0.08), transparent 30%),
        radial-gradient(circle at 86% 0%, rgba(48, 209, 88, 0.06), transparent 28%),
        linear-gradient(180deg, #1c1c1e 0%, var(--bg) 44%, #000 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.42) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.42) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.5), transparent 58%);
      pointer-events: none;
    }

    [data-theme="dark"] body::before {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
    }

    button,
    input,
    textarea {
      font: inherit;
      min-width: 0;
    }

    .app {
      width: calc(100% - 32px);
      max-width: 1220px;
      margin: 0 auto;
      padding: 34px 0 48px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 420px);
      align-items: stretch;
      gap: 18px;
      margin-bottom: 20px;
      padding: 20px 24px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(26px);
      min-width: 0;
    }

    .hero-copy {
      display: grid;
      align-content: center;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 6vw, 68px);
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: 2px;
    }

    .subtitle-en {
      margin: 6px 0 0;
      color: var(--blue);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .today-pill {
      width: fit-content;
      margin-top: 12px;
      padding: 9px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      background: var(--btn-secondary-bg);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .today-summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      align-content: start;
      min-width: 0;
    }

    .summary-card {
      min-height: 96px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .summary-card.wide {
      grid-column: 1 / -1;
      min-height: auto;
    }

    .summary-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    .summary-value {
      display: block;
      margin-top: 7px;
      font-size: 24px;
      line-height: 1.08;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .summary-note {
      display: block;
      margin-top: 7px;
      color: var(--soft);
      font-size: 12px;
      line-height: 1.45;
      font-weight: 650;
      overflow-wrap: anywhere;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(316px, 398px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      overflow: hidden;
      min-width: 0;
    }

    .panel-inner {
      padding: 22px;
    }

    .panel h2 {
      margin: 0 0 16px;
      font-size: 21px;
      line-height: 1.25;
      font-weight: 780;
    }

    .form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.2;
      font-weight: 720;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    input {
      height: 48px;
      padding: 0 14px;
    }

    textarea {
      min-height: 142px;
      resize: vertical;
      padding: 14px;
      line-height: 1.55;
    }

    input:focus,
    textarea:focus {
      border-color: var(--blue);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.13);
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 46px;
      border: 0;
      border-radius: 15px;
      padding: 0 18px;
      cursor: pointer;
      font-weight: 760;
      color: #fff;
      background: linear-gradient(180deg, #2f9bff, var(--blue-deep));
      box-shadow: 0 12px 22px rgba(10, 132, 255, 0.24);
      transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 15px 28px rgba(10, 132, 255, 0.27);
    }

    .btn:active {
      transform: translateY(0);
      opacity: 0.82;
    }

    .btn.secondary {
      color: var(--text);
      background: var(--btn-secondary-bg);
      box-shadow: inset 0 0 0 1px rgba(88, 96, 115, 0.06);
    }

    .message {
      min-height: 22px;
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .message.error {
      color: var(--red);
    }

    .message.success {
      color: #1f8a3b;
    }

    .toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      display: grid;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      pointer-events: auto;
      padding: 12px 18px;
      border-radius: 14px;
      background: var(--toast-bg);
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.14);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
      max-width: 340px;
      opacity: 0;
      transform: translateX(20px);
      animation: toastIn 0.25s ease forwards;
    }

    .toast.toast-out {
      animation: toastOut 0.2s ease forwards;
    }

    .toast.error {
      border-left: 4px solid var(--red);
    }

    .toast.success {
      border-left: 4px solid var(--green);
    }

    @keyframes toastIn {
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes toastOut {
      to { opacity: 0; transform: translateX(20px); }
    }

    .theme-toggle {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 30;
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      background: var(--btn-secondary-bg);
      color: var(--text);
      font-size: 18px;
      line-height: 1;
      box-shadow: var(--shadow-soft);
      transition: transform 0.16s ease, background 0.3s ease;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
    }

    .target-settings {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .target-settings h3 {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 760;
    }

    .target-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .target-legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 26px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .legend-dot.good {
      background: #34c759;
    }

    .legend-dot.warn {
      background: #ff9500;
    }

    .legend-dot.low {
      background: #ff3b30;
    }

    .legend-dot.none {
      background: #c7c7cc;
    }

    .target-progress {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .target-progress-card {
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.74);
    }

    .target-progress-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .target-progress-card strong {
      display: block;
      margin-top: 6px;
      font-size: 22px;
      line-height: 1.1;
    }

    .target-progress-track {
      height: 8px;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #e7ebf2;
    }

    .target-progress-fill {
      height: 100%;
      border-radius: inherit;
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }

    .stat {
      min-height: 94px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: var(--shadow-soft);
    }

    .stat-name {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .stat-value {
      margin-top: 8px;
      font-size: clamp(22px, 3vw, 28px);
      line-height: 1.1;
      font-weight: 760;
      overflow-wrap: anywhere;
    }

    .stat-unit {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .stat-note {
      display: inline-flex;
      width: fit-content;
      margin-top: 10px;
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--btn-secondary-bg);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .charts {
      display: grid;
      gap: 14px;
    }

    .chart-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      overflow: hidden;
    }

    .chart-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px 0;
    }

    .chart-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-size: 15px;
      font-weight: 760;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .chart-note {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .chart-range-btns {
      display: flex;
      gap: 4px;
    }

    .range-btn {
      border: 1.5px solid var(--line);
      border-radius: 10px;
      padding: 6px 14px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .range-btn:hover {
      background: var(--btn-secondary-bg);
    }

    .range-btn.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .trend-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 14px 16px 0;
    }

    .trend-chip {
      padding: 12px;
      border-radius: 16px;
      background: var(--btn-secondary-bg);
    }

    .trend-chip span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .trend-chip strong {
      display: block;
      margin-top: 5px;
      font-size: 18px;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      padding: 10px 16px 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .legend-line {
      width: 22px;
      height: 3px;
      border-radius: 999px;
      display: inline-block;
      background: var(--blue);
    }

    .chart-frame {
      padding: 8px 14px 16px;
    }

    svg {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
    }

    .hover-point {
      outline: none;
    }

    .chart-hover-region {
      fill: transparent;
      cursor: crosshair;
    }

    .chart-focus-line,
    .chart-focus-dot,
    .point-tooltip {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease;
    }

    .hover-point:hover .chart-focus-line,
    .hover-point:hover .chart-focus-dot,
    .hover-point:hover .point-tooltip,
    .hover-point:focus .chart-focus-line,
    .hover-point:focus .chart-focus-dot,
    .hover-point:focus .point-tooltip {
      opacity: 1;
    }

    .point-tooltip rect {
      fill: var(--text);
      stroke: var(--line);
    }

    .point-tooltip text {
      fill: var(--bg);
      font-size: 11px;
    }

    .point-tooltip .tooltip-value {
      font-size: 13px;
      font-weight: 760;
    }

    .calendar-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .month-title {
      font-size: 18px;
      font-weight: 760;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      background: var(--btn-secondary-bg);
      color: var(--text);
      font-size: 22px;
      line-height: 1;
      transition: transform 0.16s ease, background 0.16s ease;
    }

    .icon-btn:hover {
      background: #fff;
      transform: translateY(-1px);
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekday {
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 0;
    }

    .day {
      position: relative;
      aspect-ratio: 1;
      min-width: 0;
      border: 1px solid transparent;
      border-radius: 15px;
      background: transparent;
      cursor: pointer;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease;
    }

    .day:hover {
      background: rgba(255, 255, 255, 0.72);
      transform: translateY(-1px);
    }

    .day.empty {
      cursor: default;
    }

    .day.empty:hover {
      background: transparent;
    }

    .day.has-record {
      background: rgba(232, 244, 255, 0.94);
      border-color: rgba(10, 132, 255, 0.24);
      color: #005fc7;
    }

    .day-target-dots {
      position: absolute;
      left: 50%;
      bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .target-marker {
      width: 8px;
      height: 8px;
      background: #d1d1d6;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.9);
    }

    .target-marker.metric-intake {
      border-radius: 50%;
    }

    .target-marker.metric-protein {
      border-radius: 2px;
      transform: rotate(45deg);
    }

    .target-marker.metric-weight {
      border-radius: 2px;
      width: 6px;
      height: 10px;
    }

    .target-status-good,
    .target-progress-fill.target-status-good {
      background: #34c759;
    }

    .target-status-warn,
    .target-progress-fill.target-status-warn {
      background: #ff9500;
    }

    .target-status-low,
    .target-progress-fill.target-status-low {
      background: #ff3b30;
    }

    .target-status-none,
    .target-progress-fill.target-status-none {
      background: #c7c7cc;
    }

    .day.selected {
      background: linear-gradient(180deg, #2f9bff, var(--blue-deep));
      color: #fff;
      box-shadow: 0 12px 22px rgba(10, 132, 255, 0.24);
    }

    .day.selected .target-marker {
      box-shadow: 0 0 0 2px var(--blue);
    }

    .day.today:not(.selected)::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 7px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--blue);
      transform: translateX(-50%);
    }

    .review {
      margin-top: 16px;
      padding: 16px;
      border-radius: 20px;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .review-date {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 760;
    }

    .review-values {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 8px;
    }

    .mini {
      padding: 12px;
      border-radius: 16px;
      background: var(--btn-secondary-bg);
    }

    .mini span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .mini strong {
      display: block;
      margin-top: 6px;
      font-size: 18px;
      overflow-wrap: anywhere;
    }

    .import-help {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .import-preview {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
    }

    .import-preview.show {
      display: grid;
      gap: 10px;
    }

    .import-preview-title {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
    }

    .import-preview-list {
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
      padding-right: 4px;
    }

    .import-preview-row {
      display: grid;
      grid-template-columns: minmax(104px, 1fr) minmax(88px, 1fr) minmax(78px, auto);
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: 14px;
      background: var(--btn-secondary-bg);
      font-size: 13px;
    }

    .import-preview-row strong {
      display: block;

      padding: 5px 8px;
      border-radius: 999px;

      background: var(--btn-secondary-bg);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .records {
      display: grid;
      gap: 10px;
      max-height: 420px;
      overflow: auto;
      padding-right: 4px;
    }

    .record {
      display: grid;
      grid-template-columns: minmax(110px, 1.2fr) repeat(4, minmax(78px, 1fr)) auto;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow-soft);
    }

    .record-date {
      font-weight: 760;
    }

    .record-value {
      color: var(--muted);
      font-size: 13px;
    }

    .record-value strong {
      display: block;
      color: var(--text);
      font-size: 15px;
    }

    .link-btn {
      border: 0;
      border-radius: 14px;
      padding: 9px 12px;
      cursor: pointer;
      color: var(--blue);
      background: var(--btn-secondary-bg);
      font-weight: 700;
      transition: background 0.16s ease, transform 0.16s ease;
    }

    .link-btn:hover {
      background: #fff;
      transform: translateY(-1px);
    }

    .delete-btn {
      color: var(--red);
    }

    .delete-btn:hover {
      background: rgba(255, 69, 58, 0.1);
    }

    .record-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .empty-state {
      padding: 28px 18px;
      border: 1px dashed var(--line);
      border-radius: 20px;
      color: var(--muted);
      text-align: center;
      background: var(--input-bg);
      line-height: 1.6;
    }

    @keyframes savePulse {
      0% { box-shadow: 0 0 0 0 rgba(48, 209, 88, 0.4); }
      70% { box-shadow: 0 0 0 12px rgba(48, 209, 88, 0); }
      100% { box-shadow: 0 0 0 0 rgba(48, 209, 88, 0); }
    }

    .save-pulse {
      animation: savePulse 0.5s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .calendar-slide {
      animation: slideIn 0.2s ease;
    }

    @keyframes numberPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .number-pop {
      animation: numberPop 0.3s ease;
    }

    .diet-pet {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      display: grid;
      justify-items: end;
      gap: 10px;
      pointer-events: none;
    }

    .pet-speech {
      width: min(260px, calc(100vw - 44px));
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--toast-bg);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.14);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.55;
      opacity: 0;
      transform: translateY(8px) scale(0.98);
      transition: opacity 0.18s ease, transform 0.18s ease;
      pointer-events: none;
    }

    .pet-speech.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .pet-button {
      position: relative;
      width: 96px;
      height: 96px;
      padding: 0;
      border: 0;
      border-radius: 28px;
      background: transparent;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.16s ease;
    }

    .pet-button:hover,
    .pet-button:focus-visible,
    .pet-button.is-talking {
      transform: translateY(-3px);
      outline: none;
    }

    .pet-art {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
      filter: drop-shadow(0 12px 16px rgba(0, 0, 0, 0.18));
    }

    .pet-button.is-talking .pet-art {
      animation: petBounce 0.42s ease;
    }

    .fox-outline {
      stroke: #3f0a7b;
      stroke-width: 4.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    [data-theme="dark"] .fox-outline {
      stroke: #c9a0ff;
    }

    [data-theme="dark"] .fox-purple {
      fill: #c9a0ff;
    }

    .fox-orange {
      fill: #ff9f2d;
    }

    .fox-white {
      fill: #fffafd;
    }

    .fox-pink {
      fill: #ff6f8e;
    }

    .fox-heart {
      fill: #f72576;
    }

    .fox-heart-shadow {
      fill: #c91867;
      opacity: 0.72;
    }

    .fox-purple {
      fill: #3f0a7b;
    }

    .fox-pad {
      fill: #ff706d;
    }

    .fox-shadow {
      fill: rgba(29, 29, 31, 0.22);
    }

    [data-theme="dark"] .fox-shadow {
      fill: rgba(0, 0, 0, 0.5);
    }

    @keyframes petBounce {
      0% {
        transform: scale(1);
      }

      45% {
        transform: scale(1.08) rotate(-2deg);
      }

      100% {
        transform: scale(1);
      }
    }

    .pet-ear,
    .pet-foot,
    .pet-eye,
    .pet-mouth,
    .pet-cheek {
      position: absolute;
      display: block;
    }

      height: 17px;

    .pet-ear.left {

    .pet-ear.right {

    .pet-face {

    }

    .pet-eye {

      width: 6px;
      height: 7px;

      background: #1d1d1f;
    }

    .pet-eye.left {
      left: 22px;
    }

    .pet-eye.right {
      right: 22px;
    }

    .pet-cheek {

      left: 15px;
    }

    .pet-cheek.right {
      right: 15px;
    }

    .pet-mouth {
      left: 50%;
      top: 37px;
      width: 11px;
      height: 6px;
      border-bottom: 2px solid #1d1d1f;
      border-radius: 0 0 999px 999px;
      transform: translateX(-50%);

    .pet-foot {

      height: 7px;
      border-radius: 999px;
      background: #ffcc66;
    }

    .pet-foot.left {
      left: 17px;
    }

    .pet-foot.right {
      right: 17px;
    }

    @media (max-width: 880px) {
      .grid {
        grid-template-columns: 1fr;

        grid-template-columns: 1fr;
      }

        align-items: center;
        justify-content: center;
      }

</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="hero-copy">
        <h1>每日饮食记录</h1>
        <p class="subtitle-en">Daily Diet Tracker</p>

        </div>
      </div>

    <section class="grid">
      <div class="stack">
        <section class="panel">
          <div class="panel-inner">

            <form class="form" id="recordForm">

                日期
                <input id="dateInput" type="date" required>
              </label>
              <label>
                摄入 kcal（必填）
                <input id="intakeInput" type="number" min="0" step="1" placeholder="例如 2100" required>
              </label>
              <div class="field-row">
                <label>
                  体重 kg（可不填）

                <label>
                  蛋白质 g（可不填）
                  <input id="proteinInput" type="number" min="0" step="0.1" placeholder="例如 120">
                </label>
              </div>
              <label>
                饮水 ml（可不填）
                <input id="waterInput" type="number" min="0" step="10" placeholder="例如 2000">
              </label>
              <div class="button-row">
                <button class="btn" type="submit">保存记录</button>
                <button class="btn secondary" type="button" id="clearFormBtn">清空输入</button>
              </div>
              <p class="message" id="formMessage"></p>
            </form>
            <div class="target-settings">
              <h3>每日目标</h3>
              <div class="field-row">
                <label>
                  热量目标 kcal
                  <input id="targetIntakeInput" type="number" min="0" step="1" placeholder="例如 1500">
                </label>
                <label>
                  蛋白目标 g
                  <input id="targetProteinInput" type="number" min="0" step="0.1" placeholder="例如 100">
                </label>
              </div>
              <div class="field-row" style="margin-top: 12px;">
                <label>
                  身高 cm（用于 BMI）
                  <input id="heightInput" type="number" min="0" step="0.1" placeholder="例如 170">
                </label>
                <label>
                  饮水目标 ml
                  <input id="targetWaterInput" type="number" min="0" step="10" placeholder="例如 2000">
                </label>
              </div>
              <div class="button-row" style="margin-top: 12px;">
                <button class="btn secondary" type="button" id="saveTargetsBtn">保存目标</button>
              </div>
              <div class="target-legend" aria-label="日历颜色说明">
                <span>日历小点：圆点热量，菱形蛋白</span>
                <span><i class="legend-dot good"></i>达标</span>
                <span><i class="legend-dot warn"></i>稍低</span>
                <span><i class="legend-dot low"></i>偏低</span>
                <span><i class="legend-dot none"></i>未填</span>
              </div>
              <div class="target-progress" id="targetProgress"></div>
              <p class="message" id="targetMessage"></p>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-inner">
            <h2>批量导入</h2>
            <p class="import-help">从表格复制后粘贴到这里。先写日期，再写摄入即可；也支持 2/12：650、2月12日 650大卡、2026.2.12，650 这类写法。体重和蛋白质可以空着。</p>
            <textarea id="importText" placeholder="2/12：650&#10;2月13日 1000大卡&#10;2026.2.14，600"></textarea>
            <div class="button-row" style="margin-top: 12px;">
              <button class="btn" type="button" id="importBtn">先预览</button>
              <button class="btn secondary" type="button" id="confirmImportBtn">确认录入</button>
              <button class="btn secondary" type="button" id="clearImportBtn">清空导入框</button>
            </div>
            <div class="button-row" style="margin-top: 8px;">
              <button class="btn secondary" type="button" id="exportBtn">导出 CSV</button>
              <label class="btn secondary" style="cursor: pointer; margin: 0;">
                导入文件
                <input type="file" id="fileImportInput" accept=".csv,.json" style="display: none;">
              </label>
            </div>
            <div class="import-preview" id="importPreview"></div>
            <p class="message" id="importMessage"></p>
          </div>
        </section>

        <section class="panel">
          <div class="panel-inner">
            <div class="calendar-tools">
              <button class="icon-btn" type="button" id="prevMonthBtn" aria-label="上个月">‹</button>
              <div class="month-title" id="monthTitle"></div>
              <button class="icon-btn" type="button" id="nextMonthBtn" aria-label="下个月">›</button>
            </div>
            <div class="calendar" id="calendar"></div>
            <div class="review" id="reviewBox"></div>
          </div>
        </section>
      </div>

      <div class="stack">
        <section class="panel">
          <div class="panel-inner">
            <h2>整体趋势</h2>
            <div class="stats" id="stats"></div>
            <div class="charts" id="charts" style="margin-top: 14px;"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-inner">
            <h2>全部记录</h2>
            <div class="records" id="records"></div>
          </div>
        </section>
      </div>
    </section>
  </main>
